name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - x86_64-windows-gnu
          - aarch64-windows-gnu
          - x86_64-macos
          - aarch64-macos
        include:
          - target: x86_64-linux-musl
            os: ubuntu-latest
          - target: aarch64-linux-musl
            os: ubuntu-latest
          - target: x86_64-windows-gnu
            os: ubuntu-latest
          - target: aarch64-windows-gnu
            os: ubuntu-latest
          - target: x86_64-macos
            os: macos-latest
          - target: aarch64-macos
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Run Tests (Native only)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-linux-musl'
        run: zig build test
